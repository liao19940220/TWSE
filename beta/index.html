<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易與資產管理系統</title>
    <!-- Tailwind CSS (排版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (圖表) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-2 md:p-6 text-sm text-gray-800">

    <div class="max-w-6xl mx-auto space-y-4 md:space-y-6">
        <!-- 標頭 -->
        <header class="bg-white p-4 md:p-6 rounded-lg shadow-sm border flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-lg md:text-2xl font-bold text-gray-800">股票交易與資產管理系統</h1>
                <p class="text-[11px] md:text-xs text-gray-400 mt-0.5">資料儲存於本地瀏覽器。建議定期備份以免資料遺失。</p>
            </div>
            <!-- 備份功能 -->
            <div class="flex flex-wrap gap-1.5 w-full md:w-auto">
                <button onclick="exportData()" class="flex-1 md:flex-initial bg-gray-500 hover:bg-gray-600 text-white text-[11px] md:text-xs px-2.5 py-1.5 rounded transition">匯出備份</button>
                <label class="flex-1 md:flex-initial text-center bg-gray-500 hover:bg-gray-600 text-white text-[11px] md:text-xs px-2.5 py-1.5 rounded cursor-pointer transition">
                    匯入備份
                    <input type="file" id="importFile" onchange="importData(event)" class="hidden">
                </label>
                <button onclick="clearAllData()" class="flex-1 md:flex-initial bg-red-500 hover:bg-red-600 text-white text-[11px] md:text-xs px-2.5 py-1.5 rounded transition">重設</button>
            </div>
        </header>

        <!-- 分頁切換按鈕 -->
        <div class="flex border-b border-gray-200">
            <button id="tab-main-btn" onclick="switchTab('main')" class="flex-1 md:flex-initial text-center px-4 py-2.5 border-b-2 border-blue-500 text-blue-600 font-semibold text-xs md:text-sm transition">
                交易與庫存
            </button>
            <button id="tab-chart-btn" onclick="switchTab('chart')" class="flex-1 md:flex-initial text-center px-4 py-2.5 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-semibold text-xs md:text-sm transition">
                資產走勢圖
            </button>
        </div>

        <!-- 分頁一：交易與庫存 -->
        <div id="tab-main" class="space-y-6 block">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                <!-- 左側：輸入表單區 -->
                <div class="space-y-4 md:col-span-1">
                    <!-- 新增交易表單 -->
                    <div class="bg-white p-4 md:p-5 rounded-lg shadow-sm border space-y-3">
                        <h2 class="text-base md:text-lg font-semibold text-gray-700 border-b pb-1.5">新增交易 / 資金進出</h2>
                        <form id="txForm" class="space-y-3" novalidate>
                            <div>
                                <label class="block text-xs font-medium text-gray-600">交易類型</label>
                                <select id="type" onchange="toggleFormFields()" class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-1.5 text-xs md:text-sm">
                                    <option value="BUY">買入股票</option>
                                    <option value="SELL">賣出股票</option>
                                    <option value="DEPOSIT">帳戶入金 (存入現金)</option>
                                    <option value="WITHDRAW">帳戶出金 (提現)</option>
                                </select>
                            </div>
                            <div id="stockFields">
                                <label class="block text-xs font-medium text-gray-600">股票代號</label>
                                <input type="text" id="symbol" placeholder="如: 2330" class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-1.5 text-xs md:text-sm">
                            </div>
                            <div>
                                <label id="amountLabel" class="block text-xs font-medium text-gray-600">單價 (元)</label>
                                <input type="number" step="0.01" id="price" class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-1.5 text-xs md:text-sm">
                            </div>
                            <div id="qtyField">
                                <label class="block text-xs font-medium text-gray-600">股數</label>
                                <input type="number" id="quantity" class="mt-1 block w-fu
