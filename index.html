<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票交易與資產管理系統</title>
    <!-- Tailwind CSS (排版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (圖表 - 允許延遲或載入失敗) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- 標頭 -->
        <header class="bg-white p-6 rounded-lg shadow-sm border flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">股票交易與資產管理系統</h1>
                <p class="text-xs text-gray-400 mt-1">資料儲存於本地瀏覽器。建議定期備份以免資料遺失。</p>
            </div>
            <!-- 備份功能 -->
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-gray-500 hover:bg-gray-600 text-white text-xs px-3 py-2 rounded">匯出備份</button>
                <label class="bg-gray-500 hover:bg-gray-600 text-white text-xs px-3 py-2 rounded cursor-pointer">
                    匯入備份
                    <input type="file" id="importFile" onchange="importData(event)" class="hidden">
                </label>
                <button onclick="clearAllData()" class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-2 rounded">重設系統</button>
            </div>
        </header>

        <!-- 分頁切換按鈕 -->
        <div class="flex border-b border-gray-200">
            <button id="tab-main-btn" onclick="switchTab('main')" class="px-6 py-3 border-b-2 border-blue-500 text-blue-600 font-semibold text-sm">
                交易與庫存
            </button>
            <button id="tab-chart-btn" onclick="switchTab('chart')" class="px-6 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-semibold text-sm">
                資產走勢圖
            </button>
        </div>

        <!-- 分頁一：交易與庫存 -->
        <div id="tab-main" class="space-y-6 block">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 左側：輸入表單區 -->
                <div class="space-y-6 md:col-span-1">
                    <!-- 新增交易表單 -->
                    <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
                        <h2 class="text-lg font-semibold text-gray-700">新增交易 / 資金進出</h2>
                        <form id="txForm" class="space-y-4" novalidate>
                            <div>
                                <label class="block text-sm font-medium text-gray-600">交易類型</label>
                                <select id="type" onchange="toggleFormFields()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                                    <option value="BUY">買入股票</option>
                                    <option value="SELL">賣出股票</option>
                                    <option value="DEPOSIT">帳戶入金 (存入現金)</option>
                                    <option value="WITHDRAW">帳戶出金 (提現)</option>
                                </select>
                            </div>
                            <div id="stockFields">
                                <label class="block text-sm font-medium text-gray-600">股票代號</label>
                                <input type="text" id="symbol" placeholder="如: 2330" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <div>
                                <label id="amountLabel" class="block text-sm font-medium text-gray-600">單價 (元)</label>
                                <input type="number" step="0.01" id="price" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <div id="qtyField">
                                <label class="block text-sm font-medium text-gray-600">股數</label>
                                <input type="number" id="quantity" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600">日期</label>
                                <input type="date" id="date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-150">
                                確認送出
                            </button>
                        </form>
                    </div>

                    <!-- 補登歷史收盤價表單 -->
                    <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
                        <h2 class="text-lg font-semibold text-gray-700">補登歷史收盤價</h2>
                        <p class="text-xs text-gray-400">若補登歷史交易，可在此輸入當天真實收盤價，以優化歷史趨勢圖精度。</p>
                        <form id="histForm" class="space-y-4" novalidate>
                            <div>
                                <label class="block text-sm font-medium text-gray-600">選擇日期</label>
                                <input type="date" id="histDate" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600">股票代號</label>
                                <input type="text" id="histSymbol" placeholder="如: 2330" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600">當天真實收盤價 (元)</label>
                                <input type="number" step="0.01" id="histPrice" placeholder="輸入收盤價" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200 border p-2">
                            </div>
                            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-md transition duration-150 text-sm">
                                確認補登收盤價
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 右側：資產看板與庫存 -->
                <div class="bg-white p-6 rounded-lg shadow-sm border md:col-span-2 space-y-6">
                    <!-- 資產看板 -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-b pb-6">
                        <div>
                            <div class="text-xs text-gray-400">目前帳戶現金</div>
                            <div class="text-xl font-bold text-gray-800" id="currentCash">NT$ 0</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-400">持股市值</div>
                            <div class="text-xl font-bold text-gray-800" id="stockMarketValue">NT$ 0</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-400">未實現損益</div>
                            <div class="text-xl font-bold" id="totalUnrealizedPnl">NT$ 0</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-400">已實現損益 (累積)</div>
                            <div class="text-xl font-bold" id="totalRealizedPnl">NT$ 0</div>
                        </div>
                    </div>

                    <!-- 庫存列表 -->
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <h2 class="text-lg font-semibold text-gray-700">現有持股庫存</h2>
                            <div class="flex items-center gap-2">
                                <button id="fetchPriceBtn" onclick="fetchTwsePrices()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-1.5 px-3 rounded">
                                    更新今日收盤價
                                </button>
                                <span id="apiStatus" class="text-xs text-gray-400">尚未更新</span>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-2 text-left text-gray-500">代號 / 名稱</th>
                                        <th class="px-4 py-2 text-left text-gray-500">持股數</th>
                                        <th class="px-4 py-2 text-left text-gray-500">平均成本</th>
                                        <th class="px-4 py-2 text-left text-gray-500 w-24">目前市價</th>
                                        <th class="px-4 py-2 text-left text-gray-500">未實現損益</th>
                                    </tr>
                                </thead>
                                <tbody id="holdingsTable" class="divide-y divide-gray-200">
                                    <!-- 動態插入 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 歷史紀錄 -->
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">歷史交易與資金明細</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-gray-500">日期</th>
                                <th class="px-4 py-3 text-left text-gray-500">類型</th>
                                <th class="px-4 py-3 text-left text-gray-500">標對 / 名稱</th>
                                <th class="px-4 py-3 text-left text-gray-500">單價 / 金額</th>
                                <th class="px-4 py-3 text-left text-gray-500">數量</th>
                                <th class="px-4 py-3 text-left text-gray-500">收支變動</th>
                                <th class="px-4 py-3 text-left text-gray-500">操作</th>
                            </tr>
                        </thead>
                        <tbody id="txHistoryTable" class="divide-y divide-gray-200">
                            <!-- 動態插入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 分頁二：圖表分析 -->
        <div id="tab-chart" class="hidden bg-white p-6 rounded-lg shadow-sm border space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b pb-4">
                <h2 class="text-lg font-semibold text-gray-700">資產歷史趨勢圖</h2>
                
                <!-- 控制面板：篩選與區間選擇 -->
                <div class="flex flex-wrap items-center gap-3">
                    <div class="flex bg-gray-100 rounded-md p-1 gap-1 text-xs">
                        <button id="btn-scale-daily" onclick="changeChartScale('daily', this)" class="px-3 py-1 bg-blue-500 text-white font-medium rounded shadow-sm">每日</button>
                        <button id="btn-scale-monthly" onclick="changeChartScale('monthly', this)" class="px-3 py-1 text-gray-600 hover:text-gray-900 rounded">每月</button>
                        <button id="btn-scale-yearly" onclick="changeChartScale('yearly', this)" class="px-3 py-1 text-gray-600 hover:text-gray-900 rounded">每年</button>
                    </div>
                    
                    <div class="flex items-center gap-2 text-xs text-gray-600">
                        <input type="date" id="chartStartDate" onchange="onCustomRangeChange()" class="border rounded p-1 focus:border-blue-500">
                        <span>至</span>
                        <input type="date" id="chartEndDate" onchange="onCustomRangeChange()" class="border rounded p-1 focus:border-blue-500">
                    </div>
                </div>
            </div>
            
            <p class="text-xs text-gray-400">提示：圖表會根據您輸入的交易日期自動重播歷史資產。若某一天曾手動補登收盤價，將會套用補登價格計算。</p>

            <div class="relative w-full h-[400px]">
                <canvas id="assetChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 資料載入與防衝突初始化 ---
        let transactions = [];
        let currentPrices = {};
        let stockNames = {}; 
        let historicalPrices = {}; 

        const defaultNames = {
            "2330": "台積電",
            "2317": "鴻海",
            "2454": "聯發科",
            "2308": "台達電",
            "2881": "富邦金",
            "2882": "國泰金",
            "0050": "元大台灣50",
            "0056": "元大高股息",
            "00878": "國泰永續高股息"
        };

        function initLocalStorage() {
            try {
                transactions = JSON.parse(localStorage.getItem('stock_v6_tx')) || [];
                currentPrices = JSON.parse(localStorage.getItem('stock_v6_prices')) || {};
                
                const savedNames = JSON.parse(localStorage.getItem('stock_v6_names')) || {};
                stockNames = { ...defaultNames, ...savedNames };

                historicalPrices = JSON.parse(localStorage.getItem('stock_v7_historical_prices')) || {};
            } catch (e) {
                console.error("讀取本地儲存失敗，已重新初始化", e);
                stockNames = { ...defaultNames };
                historicalPrices = {};
            }
        }

        initLocalStorage();

        const txForm = document.getElementById('txForm');
        const histForm = document.getElementById('histForm');
        const txHistoryTable = document.getElementById('txHistoryTable');
        const holdingsTable = document.getElementById('holdingsTable');
        
        let activeTab = 'main';
        let assetChartInstance = null;
        let currentChartScale = 'daily'; 

        // 預設日期安全設定
        const dateInputEl = document.getElementById('date');
        if (dateInputEl) {
            dateInputEl.value = new Date().toISOString().split('T')[0];
        }
        const histDateInputEl = document.getElementById('histDate');
        if (histDateInputEl) {
            histDateInputEl.value = new Date().toISOString().split('T')[0];
        }

        // 介面欄位安全切換
        function toggleFormFields() {
            const typeEl = document.getElementById('type');
            const stockFields = document.getElementById('stockFields');
            const qtyField = document.getElementById('qtyField');
            const amountLabel = document.getElementById('amountLabel');

            if (!typeEl || !stockFields || !qtyField || !amountLabel) return;

            if (typeEl.value === 'DEPOSIT' || typeEl.value === 'WITHDRAW') {
                stockFields.style.display = 'none';
                qtyField.style.display = 'none';
                amountLabel.innerText = "金額 (元)";
            } else {
                stockFields.style.display = 'block';
                qtyField.style.display = 'block';
                amountLabel.innerText = "單價 (元)";
            }
        }

        // 新增交易
        if (txForm) {
            txForm.addEventListener('submit', function(e) {
                e.preventDefault();
                try {
                    const type = document.getElementById('type').value;
                    const symbolInput = document.getElementById('symbol').value.trim().toUpperCase();
                    const priceInput = document.getElementById('price').value;
                    const qtyInput = document.getElementById('quantity').value;
                    const dateInput = document.getElementById('date').value;

                    if (!dateInput) {
                        alert("請選擇日期");
                        return;
                    }
                    const priceVal = parseFloat(priceInput);
                    if (isNaN(priceVal) || priceVal <= 0) {
                        alert("請輸入大於 0 的金額/單價");
                        return;
                    }

                    let qtyVal = 1;
                    let finalSymbol = 'CASH';

                    if (type === 'BUY' || type === 'SELL') {
                        if (!symbolInput) {
                            alert("請輸入股票代號");
                            return;
                        }
                        qtyVal = parseInt(qtyInput);
                        if (isNaN(qtyVal) || qtyVal <= 0) {
                            alert("請輸入大於 0 的股數");
                            return;
                        }
                        finalSymbol = symbolInput;
                    }

                    const tx = {
                        id: Date.now().toString(),
                        type: type,
                        symbol: finalSymbol,
                        price: priceVal,
                        quantity: qtyVal,
                        date: dateInput
                    };

                    transactions.push(tx);
                    transactions.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                    
                    saveData();
                    render();
                    
                    txForm.reset();
                    if (dateInputEl) dateInputEl.value = new Date().toISOString().split('T')[0];
                    toggleFormFields();
                    
                } catch (err) {
                    alert("新增資料失敗: " + err.message);
                }
            });
        }

        // 手動補登歷史收盤價
        if (histForm) {
            histForm.addEventListener('submit', function(e) {
                e.preventDefault();
                try {
                    const date = document.getElementById('histDate').value;
                    const symbol = document.getElementById('histSymbol').value.trim().toUpperCase();
                    const priceInput = document.getElementById('histPrice').value;

                    if (!date || !symbol) {
                        alert("請填寫完整的日期與代號");
                        return;
                    }
                    const priceVal = parseFloat(priceInput);
                    if (isNaN(priceVal) || priceVal <= 0) {
                        alert("請輸入有效的收盤價格");
                        return;
                    }

                    if (!historicalPrices[date]) {
                        historicalPrices[date] = {};
                    }
                    historicalPrices[date][symbol] = priceVal;
                    localStorage.setItem('stock_v7_historical_prices', JSON.stringify(historicalPrices));

                    const today = new Date().toISOString().split('T')[0];
                    if (date === today) {
                        currentPrices[symbol] = priceVal;
                        localStorage.setItem('stock_v6_prices', JSON.stringify(currentPrices));
                    }

                    calculateAndRender();
                    alert(`已記錄 ${date} [${symbol}] 收盤價為 ${priceVal} 元`);
                    histForm.reset();
                    if (histDateInputEl) histDateInputEl.value = new Date().toISOString().split('T')[0];
                } catch (err) {
                    alert("補登失敗: " + err.message);
                }
            });
        }

        // 刪除歷史紀錄
        window.deleteTx = function(id) {
            transactions = transactions.filter(tx => tx.id !== id);
            saveData();
            render();
        };

        // 手動變更目前市價
        window.updateCurrentPrice = function(symbol, value) {
            const parsedVal = parseFloat(value);
            const price = isNaN(parsedVal) ? 0 : parsedVal;
            currentPrices[symbol] = price;
            localStorage.setItem('stock_v6_prices', JSON.stringify(currentPrices));

            const today = new Date().toISOString().split('T')[0];
            if (!historicalPrices[today]) {
                historicalPrices[today] = {};
            }
            historicalPrices[today][symbol] = price;
            localStorage.setItem('stock_v7_historical_prices', JSON.stringify(historicalPrices));

            calculateAndRender();
        };

        // --- 【大升級】連線 Yahoo Finance 取得盤中/收盤即時股價，且無上限支援上市/上櫃 ---
        window.fetchTwsePrices = async function() {
            const btn = document.getElementById('fetchPriceBtn');
            const status = document.getElementById('apiStatus');
            if (!btn || !status) return;

            const activeSymbols = getActiveSymbols();
            if (activeSymbols.length === 0) {
                status.innerText = "目前庫存無持股";
                return;
            }

            btn.disabled = true;
            btn.innerText = "連線中...";
            status.innerText = "正向 Yahoo 讀取最新報價...";

            const today = new Date().toISOString().split('T')[0];
            if (!historicalPrices[today]) {
                historicalPrices[today] = {};
            }

            let updatedCount = 0;

            // 遍歷當前持股，進行針對性輕量查詢
            for (const sym of activeSymbols) {
                status.innerText = `讀取 ${sym} 股價中...`;
                let success = false;
                
                // 台股後綴：.TW (上市股票/大部分ETF) 與 .TWO (上櫃股票)
                const suffixes = ['.TW', '.TWO'];

                for (const suffix of suffixes) {
                    if (success) break;

                    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}${suffix}`;
                    // 改用高速且純淨直通的 corsproxy.io 解決行動裝置/電腦 CORS 跨域阻擋問題
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

                    try {
                        const response = await fetch(proxyUrl);
                        if (!response.ok) continue; // 失敗則嘗試下一個後綴

                        const data = await response.json();
                        const result = data?.chart?.result?.[0];

                        if (result && result.meta && result.meta.regularMarketPrice !== undefined) {
                            const price = parseFloat(result.meta.regularMarketPrice);
                            if (!isNaN(price) && price > 0) {
                                currentPrices[sym] = price;
                                historicalPrices[today][sym] = price; // 同步寫入當日歷史庫
                                
                                // 嘗試更新中文名稱（如果 Yahoo 有回傳中文名稱）
                                if (result.meta.shortName && !result.meta.shortName.match(/^[a-zA-Z0-9]/)) {
                                    stockNames[sym] = result.meta.shortName;
                                }

                                updatedCount++;
                                success = true;
                            }
                        }
                    } catch (err) {
                        // 異常時，靜默進行下一個嘗試
                    }
                }
            }

            // 更新存檔
            localStorage.setItem('stock_v6_prices', JSON.stringify(currentPrices));
            localStorage.setItem('stock_v7_historical_prices', JSON.stringify(historicalPrices));
            localStorage.setItem('stock_v6_names', JSON.stringify(stockNames));

            calculateAndRender();

            const now = new Date();
            status.innerText = `Yahoo 成功更新 ${updatedCount} 檔持股 (${now.toLocaleTimeString()})`;
            btn.disabled = false;
            btn.innerText = "更新今日收盤價";
        };

        function getActiveSymbols() {
            const holdings = {};
            transactions.forEach(tx => {
                if (tx.type === 'DEPOSIT' || tx.type === 'WITHDRAW') return;
                const sym = tx.symbol || 'UNKNOWN';
                const qty = Number(tx.quantity) || 0;
                if (!holdings[sym]) holdings[sym] = 0;
                holdings[sym] += (tx.type === 'BUY' ? qty : -qty);
            });
            return Object.keys(holdings).filter(sym => holdings[sym] > 0);
        }

        // 核心庫存計算
        function calculateAndRender() {
            let cash = 0;
            let stockMarketValue = 0;
            let totalUnrealizedPnl = 0;
            let totalRealizedPnl = 0;
            const holdings = {};

            transactions.forEach(tx => {
                const price = Number(tx.price) || 0;
                const quantity = Number(tx.quantity) || 0;
                const cost = price * quantity;

                if (tx.type === 'DEPOSIT') {
                    cash += price; 
                } else if (tx.type === 'WITHDRAW') {
                    cash -= price;
                } else if (tx.type === 'BUY') {
                    cash -= cost; 
                    
                    if (!holdings[tx.symbol]) holdings[tx.symbol] = { qty: 0, totalCost: 0, avgCost: 0 };
                    holdings[tx.symbol].qty += quantity;
                    holdings[tx.symbol].totalCost += cost;
                    holdings[tx.symbol].avgCost = holdings[tx.symbol].qty > 0 ? (holdings[tx.symbol].totalCost / holdings[tx.symbol].qty) : 0;
                } else if (tx.type === 'SELL') {
                    cash += cost; 
                    
                    const hold = holdings[tx.symbol];
                    if (hold && hold.qty > 0) {
                        const realized = (price - (hold.avgCost || 0)) * quantity;
                        totalRealizedPnl += realized;

                        hold.qty -= quantity;
                        hold.totalCost = hold.qty * (hold.avgCost || 0);
                    }
                }
            });

            if (holdingsTable) {
                holdingsTable.innerHTML = '';
                Object.keys(holdings).forEach(sym => {
                    const hold = holdings[sym];
                    if (hold.qty > 0) {
                        const currentPrice = Number(currentPrices[sym]) || 0;
                        const marketVal = hold.qty * currentPrice;
                        const costVal = hold.qty * (hold.avgCost || 0);
                        const unrealized = currentPrice > 0 ? (marketVal - costVal) : 0;
                        const percent = costVal > 0 ? ((unrealized / costVal) * 100) : 0;

                        if (currentPrice > 0) {
                            stockMarketValue += marketVal;
                            totalUnrealizedPnl += unrealized;
                        }

                        let pnlClass = "text-gray-600";
                        let pnlSign = "";
                        if (currentPrice > 0) {
                            if (unrealized > 0) { 
                                pnlClass = "text-red-600 font-semibold"; 
                                pnlSign = "+"; 
                            } else if (unrealized < 0) { 
                                pnlClass = "text-green-600 font-semibold"; 
                            }
                        }

                        const nameText = stockNames[sym] ? `<span class="text-xs text-gray-400 block">${stockNames[sym]}</span>` : '';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="px-4 py-2 font-medium text-gray-700">
                                <div>${sym}${nameText}</div>
                            </td>
                            <td class="px-4 py-2">${hold.qty.toLocaleString()}</td>
                            <td class="px-4 py-2">NT$ ${(hold.avgCost || 0).toFixed(2)}</td>
                            <td class="px-4 py-2">
                                <input type="number" step="0.01" value="${currentPrice || ''}" placeholder="輸入市價" onchange="updateCurrentPrice('${sym}', this.value)" class="w-20 border rounded px-1.5 py-0.5 text-xs">
                            </td>
                            <td class="px-4 py-2 ${pnlClass}">
                                ${currentPrice > 0 ? `${pnlSign}${unrealized.toLocaleString('zh-TW', {maximumFractionDigits: 0})} (${pnlSign}${percent.toFixed(2)}%)` : '--'}
                            </td>
                        `;
                        holdingsTable.appendChild(tr);
                    }
                });
            }

            const elCash = document.getElementById('currentCash');
            const elMarket = document.getElementById('stockMarketValue');
            const elUnrealized = document.getElementById('totalUnrealizedPnl');
            const elRealized = document.getElementById('totalRealizedPnl');

            if (elCash) elCash.innerText = `NT$ ${cash.toLocaleString('zh-TW', {maximumFractionDigits: 0})}`;
            if (elMarket) elMarket.innerText = `NT$ ${stockMarketValue.toLocaleString('zh-TW', {maximumFractionDigits: 0})}`;
            if (elUnrealized) formatColorText(elUnrealized, totalUnrealizedPnl);
            if (elRealized) formatColorText(elRealized, totalRealizedPnl);

            return { cash, stockMarketValue, totalUnrealizedPnl };
        }

        function formatColorText(el, val) {
            if (!el) return;
            el.innerText = `NT$ ${val.toLocaleString('zh-TW', {maximumFractionDigits: 0})}`;
            if (val > 0) el.className = "text-xl font-bold text-red-600";
            else if (val < 0) el.className = "text-xl font-bold text-green-600";
            else el.className = "text-xl font-bold text-gray-800";
        }
